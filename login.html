<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style-vertical.css">
    <title>Quizztador - Autentificare</title>
</head>
<body bgcolor="#f0f8ff">
    <ul id="navi-bar">
        <li><a href="home.html"><i class="icon icon-home"></i> Acasă</a></li>
        <li><a href=""><i class="icon icon-news"></i> Noutăți</a></li>
        <li><a href="profile.html"><i class="icon icon-profile"></i> Profil</a></li>
        <li><a href=""><i class="icon icon-info"></i> Informații</a></li>
    </ul>

    <header>
        <center> 
            <h1>Quizztador</h1>
        </center>
    </header>

    <center>
        <h2>Intră în contul tău</h2>
        <p>Introdu datele pentru a relua jocul:</p>

        <form action="home.html" target="_self" id="loginForm">
            <input type="text" name="user" size="25" maxlength="30" placeholder="Numele tău" title="Introdu pseudonimul">
            <br><br>
            <input type="password" name="pass" size="25" maxlength="30" placeholder="Parola secretă">
            <br><br>
            <input type="checkbox" name="keep_log" value="1" checked> Rămâi conectat
            <br><br>
            <input type="submit" value="Autentificare">
        </form>

        <br><br>
        <a href="signup.html" target="_self">Creează un profil nou aici!</a>
    </center>

    <footer>
        <center>
            <p>Quizztador</p>
        </center>
    </footer>

    <script src="data.js"></script>
    <script src="script.js"></script>
    <script>
        const form = document.getElementById('loginForm');
        const inputUser = document.querySelector('input[name="user"]');
        const inputPass = document.querySelector('input[name="pass"]');

        form.addEventListener('submit', function(event) {
            event.preventDefault();

            const username = inputUser.value.trim();
            const password = inputPass.value;

            let isValid = true;

            if (username === "") {
                inputUser.style.borderColor = "red";
                setTimeout(() => {
                    inputUser.style.borderColor = "";
                }, 5000);
                alert("Introdu un nume valid!");
                isValid = false;
            }

            if (password === "") {
                inputPass.style.borderColor = "red";
                setTimeout(() => {
                    inputUser.style.borderColor = "";
                }, 5000);
                alert("Introdu o parola valida!");
                isValid = false;
            }

            if (isValid) {
                form.submit();
            }
        });
    </script>
</body>
</html>
